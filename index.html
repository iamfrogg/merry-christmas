<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Permissions-Policy: disable every powerful browser API this page does not use.
     autoplay=self  — required for the muted video autoplay + the unmute button.
     All sensor / capture / device APIs are explicitly denied (empty allowlist). -->
<meta http-equiv="Permissions-Policy"
      content="accelerometer=(),
               ambient-light-sensor=(),
               autoplay=(self),
               battery=(),
               camera=(),
               display-capture=(),
               document-domain=(),
               encrypted-media=(),
               execution-while-not-rendered=(),
               execution-while-out-of-viewport=(),
               fullscreen=(self),
               geolocation=(),
               gyroscope=(),
               magnetometer=(),
               microphone=(),
               midi=(),
               navigation-override=(),
               payment=(),
               picture-in-picture=(),
               publickey-credentials-get=(),
               screen-wake-lock=(),
               sync-xhr=(),
               usb=(),
               web-share=(),
               xr-spatial-tracking=()">
<title>Merry Christmas</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}
video{
    width:100%;
    height:100%;
    object-fit:cover;
}
#snow-canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}
button{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:10px 15px;
    font-size:16px;
    z-index:2;
    background:rgba(255,255,255,0.9);
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>
<video id="video_url" src="./assets/1.mp4" autoplay loop muted></video>
<canvas id="snow-canvas"></canvas>
<button onclick="playSound()">🔊 Bật tiếng</button>

<script>
function playSound(){
    const video = document.getElementById("video_url");
    video.muted = false;
    video.play();
}

// Snowfall effect
const canvas = document.getElementById('snow-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const snowflakes = [];
const maxSnowflakes = 150;

function createSnowflake() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        radius: Math.random() * 3 + 1,
        speed: Math.random() * 1 + 0.5,
        wind: Math.random() * 0.5 - 0.25,
        opacity: Math.random() * 0.5 + 0.5
    };
}

function drawSnowflake(flake) {
    ctx.beginPath();
    ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`;
    ctx.fill();
}

function updateSnowflake(flake) {
    flake.y += flake.speed;
    flake.x += flake.wind + Math.sin(flake.y * 0.01) * 0.5;
    
    if (flake.y > canvas.height || flake.x < -50 || flake.x > canvas.width + 50) {
        Object.assign(flake, createSnowflake());
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Add new snowflakes
    while (snowflakes.length < maxSnowflakes && Math.random() < 0.3) {
        snowflakes.push(createSnowflake());
    }
    
    // Update and draw all snowflakes
    snowflakes.forEach(flake => {
        updateSnowflake(flake);
        drawSnowflake(flake);
    });
    
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
