<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Permissions-Policy: disable every powerful browser API this page does not use.
     autoplay=self  — required for the muted video autoplay + the unmute button.
     All sensor / capture / device APIs are explicitly denied (empty allowlist). -->
<meta http-equiv="Permissions-Policy"
      content="accelerometer=(),
               ambient-light-sensor=(),
               autoplay=(self),
               battery=(),
               camera=(),
               display-capture=(),
               document-domain=(),
               encrypted-media=(),
               execution-while-not-rendered=(),
               execution-while-out-of-viewport=(),
               fullscreen=(self),
               geolocation=(),
               gyroscope=(),
               magnetometer=(),
               microphone=(),
               midi=(),
               navigation-override=(),
               payment=(),
               picture-in-picture=(),
               publickey-credentials-get=(),
               screen-wake-lock=(),
               sync-xhr=(),
               usb=(),
               web-share=(),
               xr-spatial-tracking=()">
<title>Merry Christmas</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}
video{
    width:100%;
    height:100%;
    object-fit:cover;
}
#snow-canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}
button{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:10px 15px;
    font-size:16px;
    z-index:2;
    background:rgba(255,255,255,0.9);
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>
<video id="video_url" src="./assets/1.mp4" autoplay loop muted></video>
<canvas id="snow-canvas"></canvas>
<button onclick="playSound()">🔊 Bật tiếng</button>

<script>
function playSound(){
    const video = document.getElementById("video_url");
    video.muted = false;
    video.play();
}

// Snowfall effect with mouse interaction
const canvas = document.getElementById('snow-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const snowflakes = [];
const maxSnowflakes = 150;
const mouse = { x: null, y: null, radius: 100 };

// Mouse move listener
canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// Mouse click - create snow burst
canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 20; i++) {
        const flake = createSnowflake();
        flake.x = e.clientX;
        flake.y = e.clientY;
        flake.vx = (Math.random() - 0.5) * 10;
        flake.vy = (Math.random() - 0.5) * 10;
        flake.isBurst = true;
        flake.life = 1;
        snowflakes.push(flake);
    }
});

// Mouse down - increase snowfall speed
canvas.addEventListener('mousedown', () => {
    snowflakes.forEach(flake => {
        flake.speed *= 1.5;
    });
});

// Mouse up - restore normal speed
canvas.addEventListener('mouseup', () => {
    snowflakes.forEach(flake => {
        if (!flake.isBurst) {
            flake.speed = flake.speed / 1.5;
        }
    });
});

function createSnowflake() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        radius: Math.random() * 3 + 1,
        speed: Math.random() * 1 + 0.5,
        wind: Math.random() * 0.5 - 0.25,
        opacity: Math.random() * 0.5 + 0.5,
        vx: 0,
        vy: 0,
        isBurst: false,
        life: 1
    };
}

function drawSnowflake(flake) {
    ctx.beginPath();
    ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
    
    // Add glow effect for burst snowflakes
    if (flake.isBurst) {
        const gradient = ctx.createRadialGradient(flake.x, flake.y, 0, flake.x, flake.y, flake.radius * 2);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${flake.opacity * flake.life})`);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gradient;
    } else {
        ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`;
    }
    
    ctx.fill();
}

function updateSnowflake(flake) {
    if (flake.isBurst) {
        flake.x += flake.vx;
        flake.y += flake.vy;
        flake.vy += 0.2;
        flake.life -= 0.01;
        
        if (flake.life <= 0) {
            snowflakes.splice(snowflakes.indexOf(flake), 1);
            return;
        }
    } else {
        flake.y += flake.speed;
        flake.x += flake.wind + Math.sin(flake.y * 0.01) * 0.5;
        
        if (mouse.x !== null && mouse.y !== null) {
            const dx = flake.x - mouse.x;
            const dy = flake.y - mouse.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                const angle = Math.atan2(dy, dx);
                flake.x += Math.cos(angle) * force * 5;
                flake.y += Math.sin(angle) * force * 5;
            }
        }
        
        if (flake.y > canvas.height || flake.x < -50 || flake.x > canvas.width + 50) {
            Object.assign(flake, createSnowflake());
        }
    }
}

// =====================================================================
//  Dancing Santa  –  drawn entirely with Canvas 2D
// =====================================================================
const santa = {
    x: 0,
    y: 0,
    scale: 1,
    time: 0,              // animation clock (radians)
    danceSpeed: 0.06,     // how fast he dances
    // body-part angles driven by the clock
    bodyBob: 0,
    armLeftAngle: 0,
    armRightAngle: 0,
    legLeftAngle: 0,
    legRightAngle: 0,
    headTilt: 0
};

function positionSanta() {
    santa.scale = Math.min(canvas.width, canvas.height) / 600;
    santa.x = canvas.width - 120 * santa.scale;
    santa.y = canvas.height - 20 * santa.scale;
}
positionSanta();
window.addEventListener('resize', positionSanta);

function updateSanta() {
    santa.time += santa.danceSpeed;
    const t = santa.time;

    // Funky dance key-poses driven by sine waves
    santa.bodyBob      = Math.sin(t * 2) * 8;
    santa.headTilt     = Math.sin(t * 3) * 0.15;
    santa.armLeftAngle = Math.sin(t * 2) * 0.7 + 0.3;
    santa.armRightAngle = Math.sin(t * 2 + Math.PI) * 0.7 - 0.3;
    santa.legLeftAngle = Math.sin(t * 2) * 0.4;
    santa.legRightAngle = Math.sin(t * 2 + Math.PI) * 0.4;
}

function drawSanta() {
    const s = santa.scale;
    const cx = santa.x;
    const groundY = santa.y;
    const bob = santa.bodyBob * s;

    ctx.save();
    ctx.translate(cx, groundY + bob);

    // ---- Shadow ----
    ctx.beginPath();
    ctx.ellipse(0, 0, 35 * s, 6 * s, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fill();

    // ---- Legs ----
    const legLen = 40 * s;
    const legY = -45 * s;

    // Left leg
    ctx.save();
    ctx.translate(-12 * s, legY);
    ctx.rotate(santa.legLeftAngle);
    // trouser
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(-6 * s, 0, 12 * s, legLen);
    // boot
    ctx.fillStyle = '#1a1a1a';
    roundRect(ctx, -8 * s, legLen - 4 * s, 18 * s, 14 * s, 4 * s);
    ctx.fill();
    ctx.restore();

    // Right leg
    ctx.save();
    ctx.translate(12 * s, legY);
    ctx.rotate(santa.legRightAngle);
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(-6 * s, 0, 12 * s, legLen);
    ctx.fillStyle = '#1a1a1a';
    roundRect(ctx, -8 * s, legLen - 4 * s, 18 * s, 14 * s, 4 * s);
    ctx.fill();
    ctx.restore();

    // ---- Body (coat) ----
    const bodyTop = -120 * s;
    ctx.fillStyle = '#cc0000';
    roundRect(ctx, -28 * s, bodyTop, 56 * s, 80 * s, 10 * s);
    ctx.fill();

    // Belt
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-28 * s, -65 * s, 56 * s, 10 * s);
    // Belt buckle
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-6 * s, -65 * s, 12 * s, 10 * s);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(-3 * s, -63 * s, 6 * s, 6 * s);

    // Fur trim (bottom of coat)
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-30 * s, -45 * s, 60 * s, 8 * s);

    // ---- Arms ----
    const armLen = 50 * s;
    const shoulderY = bodyTop + 15 * s;

    // Left arm
    ctx.save();
    ctx.translate(-28 * s, shoulderY);
    ctx.rotate(santa.armLeftAngle);
    ctx.fillStyle = '#cc0000';
    roundRect(ctx, -10 * s, 0, 12 * s, armLen, 5 * s);
    ctx.fill();
    // Mitten
    ctx.beginPath();
    ctx.arc(-4 * s, armLen + 6 * s, 8 * s, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.restore();

    // Right arm
    ctx.save();
    ctx.translate(28 * s, shoulderY);
    ctx.rotate(santa.armRightAngle);
    ctx.fillStyle = '#cc0000';
    roundRect(ctx, -2 * s, 0, 12 * s, armLen, 5 * s);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4 * s, armLen + 6 * s, 8 * s, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.restore();

    // ---- Head ----
    ctx.save();
    ctx.translate(0, bodyTop - 10 * s);
    ctx.rotate(santa.headTilt);

    // Face
    ctx.beginPath();
    ctx.arc(0, 0, 22 * s, 0, Math.PI * 2);
    ctx.fillStyle = '#fdd9b5';
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(-8 * s, -3 * s, 2.5 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(8 * s, -3 * s, 2.5 * s, 0, Math.PI * 2);
    ctx.fill();

    // Rosy cheeks
    ctx.beginPath();
    ctx.arc(-14 * s, 5 * s, 5 * s, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,100,100,0.45)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(14 * s, 5 * s, 5 * s, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    ctx.beginPath();
    ctx.arc(0, 4 * s, 4 * s, 0, Math.PI * 2);
    ctx.fillStyle = '#e87461';
    ctx.fill();

    // Smile
    ctx.beginPath();
    ctx.arc(0, 6 * s, 10 * s, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.strokeStyle = '#b5534b';
    ctx.lineWidth = 2 * s;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Beard
    ctx.beginPath();
    ctx.moveTo(-20 * s, 8 * s);
    ctx.quadraticCurveTo(-22 * s, 35 * s, 0, 38 * s);
    ctx.quadraticCurveTo(22 * s, 35 * s, 20 * s, 8 * s);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // Moustache
    ctx.beginPath();
    ctx.moveTo(0, 7 * s);
    ctx.quadraticCurveTo(-10 * s, 4 * s, -16 * s, 10 * s);
    ctx.quadraticCurveTo(-10 * s, 8 * s, 0, 7 * s);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, 7 * s);
    ctx.quadraticCurveTo(10 * s, 4 * s, 16 * s, 10 * s);
    ctx.quadraticCurveTo(10 * s, 8 * s, 0, 7 * s);
    ctx.fill();

    // Hat
    ctx.beginPath();
    ctx.moveTo(-24 * s, -8 * s);
    ctx.lineTo(-20 * s, -45 * s);
    ctx.quadraticCurveTo(10 * s, -55 * s, 30 * s, -30 * s);
    ctx.lineTo(24 * s, -8 * s);
    ctx.closePath();
    ctx.fillStyle = '#cc0000';
    ctx.fill();

    // Hat fur brim
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-26 * s, -14 * s, 52 * s, 10 * s);

    // Hat pom-pom
    ctx.beginPath();
    ctx.arc(30 * s, -30 * s, 8 * s, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    ctx.restore(); // end head

    ctx.restore(); // end santa root
}

// Helper: rounded rectangle
function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
}

// =====================================================================
//  Main animation loop
// =====================================================================
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Snow
    while (snowflakes.length < maxSnowflakes + 50 && Math.random() < 0.3) {
        snowflakes.push(createSnowflake());
    }
    for (let i = snowflakes.length - 1; i >= 0; i--) {
        updateSnowflake(snowflakes[i]);
        drawSnowflake(snowflakes[i]);
    }
    
    // Mouse circle
    if (mouse.x !== null && mouse.y !== null) {
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    // Santa
    updateSanta();
    drawSanta();
    
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
