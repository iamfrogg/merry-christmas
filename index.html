<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Permissions-Policy: disable every powerful browser API this page does not use.
     autoplay=self  — required for the muted video autoplay + the unmute button.
     All sensor / capture / device APIs are explicitly denied (empty allowlist). -->
<meta http-equiv="Permissions-Policy"
      content="accelerometer=(),
               ambient-light-sensor=(),
               autoplay=(self),
               battery=(),
               camera=(),
               display-capture=(),
               document-domain=(),
               encrypted-media=(),
               execution-while-not-rendered=(),
               execution-while-out-of-viewport=(),
               fullscreen=(self),
               geolocation=(),
               gyroscope=(),
               magnetometer=(),
               microphone=(),
               midi=(),
               navigation-override=(),
               payment=(),
               picture-in-picture=(),
               publickey-credentials-get=(),
               screen-wake-lock=(),
               sync-xhr=(),
               usb=(),
               web-share=(),
               xr-spatial-tracking=()">
<title>Merry Christmas</title>
<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}
video{
    width:100%;
    height:100%;
    object-fit:cover;
}
#snow-canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}
button{
    position:fixed;
    bottom:20px;
    left:20px;
    padding:10px 15px;
    font-size:16px;
    z-index:2;
    background:rgba(255,255,255,0.9);
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>
<video id="video_url" src="./assets/1.mp4" autoplay loop muted></video>
<canvas id="snow-canvas"></canvas>
<button onclick="playSound()">🔊 Bật tiếng</button>

<script>
function playSound(){
    const video = document.getElementById("video_url");
    video.muted = false;
    video.play();
}

// Snowfall effect with mouse interaction
const canvas = document.getElementById('snow-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const snowflakes = [];
const maxSnowflakes = 150;
const mouse = { x: null, y: null, radius: 100 };

// Mouse move listener
canvas.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// Mouse click - create snow burst
canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 20; i++) {
        const flake = createSnowflake();
        flake.x = e.clientX;
        flake.y = e.clientY;
        flake.vx = (Math.random() - 0.5) * 10;
        flake.vy = (Math.random() - 0.5) * 10;
        flake.isBurst = true;
        flake.life = 1;
        snowflakes.push(flake);
    }
});

// Mouse down - increase snowfall speed
canvas.addEventListener('mousedown', () => {
    snowflakes.forEach(flake => {
        flake.speed *= 1.5;
    });
});

// Mouse up - restore normal speed
canvas.addEventListener('mouseup', () => {
    snowflakes.forEach(flake => {
        if (!flake.isBurst) {
            flake.speed = flake.speed / 1.5;
        }
    });
});

function createSnowflake() {
    return {
        x: Math.random() * canvas.width,
        y: Math.random() * -canvas.height,
        radius: Math.random() * 3 + 1,
        speed: Math.random() * 1 + 0.5,
        wind: Math.random() * 0.5 - 0.25,
        opacity: Math.random() * 0.5 + 0.5,
        vx: 0,
        vy: 0,
        isBurst: false,
        life: 1
    };
}

function drawSnowflake(flake) {
    ctx.beginPath();
    ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
    
    // Add glow effect for burst snowflakes
    if (flake.isBurst) {
        const gradient = ctx.createRadialGradient(flake.x, flake.y, 0, flake.x, flake.y, flake.radius * 2);
        gradient.addColorStop(0, `rgba(255, 255, 255, ${flake.opacity * flake.life})`);
        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = gradient;
    } else {
        ctx.fillStyle = `rgba(255, 255, 255, ${flake.opacity})`;
    }
    
    ctx.fill();
}

function updateSnowflake(flake) {
    if (flake.isBurst) {
        // Burst animation
        flake.x += flake.vx;
        flake.y += flake.vy;
        flake.vy += 0.2; // gravity
        flake.life -= 0.01;
        
        if (flake.life <= 0) {
            snowflakes.splice(snowflakes.indexOf(flake), 1);
            return;
        }
    } else {
        // Normal falling animation
        flake.y += flake.speed;
        flake.x += flake.wind + Math.sin(flake.y * 0.01) * 0.5;
        
        // Mouse interaction - push snowflakes away
        if (mouse.x !== null && mouse.y !== null) {
            const dx = flake.x - mouse.x;
            const dy = flake.y - mouse.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                const angle = Math.atan2(dy, dx);
                flake.x += Math.cos(angle) * force * 5;
                flake.y += Math.sin(angle) * force * 5;
            }
        }
        
        if (flake.y > canvas.height || flake.x < -50 || flake.x > canvas.width + 50) {
            Object.assign(flake, createSnowflake());
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Add new snowflakes
    while (snowflakes.length < maxSnowflakes + 50 && Math.random() < 0.3) {
        snowflakes.push(createSnowflake());
    }
    
    // Update and draw all snowflakes
    for (let i = snowflakes.length - 1; i >= 0; i--) {
        updateSnowflake(snowflakes[i]);
        drawSnowflake(snowflakes[i]);
    }
    
    // Draw mouse interaction circle (subtle)
    if (mouse.x !== null && mouse.y !== null) {
        ctx.beginPath();
        ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
        ctx.lineWidth = 1;
        ctx.stroke();
    }
    
    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
